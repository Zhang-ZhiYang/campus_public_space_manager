<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人资料</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f6f8; }
        .container { max-width: 600px; margin: 0 auto; padding: 25px; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #555; }
        input[type="text"], input[type="email"], input[type="tel"], select {
            width: calc(100% - 24px);
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1em;
            color: #333;
        }
        select {
             width: 100%; /* Adjust select width to match others */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745; /* Green for save */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #218838;
        }
        #message-container {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.95em;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background-color: #e0f2f7; color: #0c5460; border: 1px solid #bee5eb; }

        .button-group {
            display: flex;
            gap: 10px; /* Adjust spacing between buttons */
            margin-top: 20px;
        }
        .button-group button {
            flex: 1; /* Make buttons take equal width */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的个人资料</h1>
        <form id="profileForm">
            <div class="form-group">
                <label for="id">用户ID:</label> <!-- Display user ID -->
                <input type="text" id="userIdDisplay" name="id" readonly>
            </div>

            <div class="form-group">
                <label for="username">用户名:</label>
                <input type="text" id="username" name="username" readonly>
            </div>

            <div class="form-group">
                <label for="name">姓名:</label> <!-- Changed id/name from fullName to name -->
                <input type="text" id="name" name="name">
            </div>

            <div class="form-group">
                <label for="email">电子邮件:</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="phoneNumber">手机号:</label>
                <input type="tel" id="phoneNumber" name="phone_number">
            </div>

            <div class="form-group">
                <label for="workId">工号/学号:</label>
                <input type="text" id="workId" name="work_id" readonly>
            </div>

            <div class="form-group">
                <label for="major">专业:</label>
                <input type="text" id="major" name="major">
            </div>

            <div class="form-group">
                <label for="studentClass">班级:</label>
                <input type="text" id="studentClass" name="student_class">
            </div>

            <div class="form-group">
                <label for="gender">性别:</label>
                <select id="gender" name="gender">
                    <option value="U">未知</option>
                    <option value="M">男</option>
                    <option value="F">女</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit">保存修改</button>
                <button type="button" onclick="logout()">退出登录</button> <!-- Added logout button -->
            </div>
        </form>

        <div id="message-container"></div>
    </div>

    <script>
        const profileForm = document.getElementById('profileForm');
        const messageContainer = document.getElementById('message-container');

        function displayMessage(message, type) {
            messageContainer.textContent = message;
            messageContainer.className = `message-container ${type}`;
        }

        function formatApiErrors(errorObject) {
             if (!errorObject || typeof errorObject !== 'object') {
                 return "未知错误。";
             }
             if (errorObject.details) {
                  if (typeof errorObject.details === 'object' && !Array.isArray(errorObject.details)) {
                     let detailMessages = [];
                     for (const field in errorObject.details) {
                         if (Object.hasOwnProperty.call(errorObject.details, field)) {
                             const messages = errorObject.details[field];
                             let displayField;
                             // Map backend field names to friendly frontend labels
                             switch (field) {
                                 case 'name': displayField = '姓名'; break; // Changed from full_name to name
                                 case 'email': displayField = '电子邮件'; break;
                                 case 'phone_number': displayField = '手机号'; break;
                                 case 'major': displayField = '专业'; break;
                                 case 'student_class': displayField = '班级'; break;
                                 case 'gender': displayField = '性别'; break;
                                 default: displayField = field.charAt(0).toUpperCase() + field.slice(1).replace(/_/g, ' '); break;
                             }

                             if (Array.isArray(messages)) {
                                 detailMessages.push(`${displayField}: ${messages.join(' ')}`);
                             } else {
                                 detailMessages.push(`${displayField}: ${messages}`);
                             }
                         }
                     }
                     return detailMessages.join('; ') || errorObject.message || "未知错误。";
                  } else if (typeof errorObject.details === 'string') {
                     return errorObject.details;
                  }
                 return errorObject.message || "未知错误。";
             }
             return errorObject.message || "未知错误。";
         }

        async function fetchUserProfile() {
            const accessToken = localStorage.getItem('access_token');
            const userId = localStorage.getItem('user_id');

            if (!accessToken || !userId) {
                displayMessage('请先登录', 'error');
                window.location.href = '/login-test/';
                return;
            }

            displayMessage('正在加载个人资料...', 'loading');

            try {
                const userResponse = await fetch(`/api/v1/users/profile/me/`, { // Changed to 'me' endpoint for current user
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    },
                });

                const userData = await userResponse.json();

                if (userResponse.ok && userData.success) {
                    const userProfile = userData.data;
                    document.getElementById('userIdDisplay').value = userProfile.id || ''; // Display user ID
                    document.getElementById('username').value = userProfile.username || '';
                    document.getElementById('name').value = userProfile.name || ''; // Changed from fullName to name
                    document.getElementById('email').value = userProfile.email || '';
                    document.getElementById('phoneNumber').value = userProfile.phone_number || '';
                    document.getElementById('workId').value = userProfile.work_id || '';
                    document.getElementById('major').value = userProfile.major || '';
                    document.getElementById('studentClass').value = userProfile.student_class || '';
                    document.getElementById('gender').value = userProfile.gender || 'U';

                    displayMessage('个人资料加载成功', 'success');
                } else if (userResponse.status === 403 || userResponse.status === 401) {
                     displayMessage('无权访问或登录已过期，请重新登录。', 'error');
                     logout(); // Call logout to clear tokens and redirect
                }
                else {
                    const errorDetails = userData.error ? formatApiErrors(userData.error) : (userData.message || '未知错误');
                    displayMessage(`加载个人资料失败: ${errorDetails}`, 'error');
                    console.error('Failed to fetch user profile:', userData);
                }
            } catch (error) {
                displayMessage(`网络错误: ${error.message}`, 'error');
                console.error('Fetch error:', error);
            }
        }

        profileForm.addEventListener('submit', async function(event) {
            event.preventDefault();

            const accessToken = localStorage.getItem('access_token');
            const userId = localStorage.getItem('user_id');

            if (!accessToken || !userId) {
                displayMessage('请先登录', 'error');
                window.location.href = '/login-test/';
                return;
            }

            displayMessage('正在保存修改...', 'loading');

            const profileData = {
                name: document.getElementById('name').value, // Changed from fullName to name
                email: document.getElementById('email').value,
                phone_number: document.getElementById('phoneNumber').value,
                major: document.getElementById('major').value,
                student_class: document.getElementById('studentClass').value,
                gender: document.getElementById('gender').value,
            };

            for (const key in profileData) {
                if (profileData[key] === '' || profileData[key] === 'U') { // Also handle 'U' for gender as empty
                    delete profileData[key];
                }
            }

            // If gender is set to 'U', send null or omit based on backend expectation
            if (profileData.gender === 'U') {
                profileData.gender = null; // Backend expects null for 'U' or empty
            }

            try {
                // Using '/me/' endpoint for updating current user's profile
                const response = await fetch(`/api/v1/users/profile/me/`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(profileData)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    displayMessage('个人资料更新成功！', 'success');
                    fetchUserProfile(); // Refresh data after successful update
                } else if (response.status === 403 || response.status === 401) {
                     displayMessage('无权操作或登录已过期，请重新登录。', 'error');
                     logout(); // Call logout to clear tokens and redirect
                }
                else {
                    const errorDetails = data.error ? formatApiErrors(data.error) : (data.message || '未知错误');
                    displayMessage(`更新失败: ${errorDetails}`, 'error');
                    console.error('Failed to update profile:', data);
                }
            } catch (error) {
                displayMessage(`网络错误: ${error.message}`, 'error');
                console.error('Fetch error:', error);
            }
        });

        async function logout() {
            const refreshToken = localStorage.getItem('refresh_token');
            const accessToken = localStorage.getItem('access_token'); // Logout endpoint might require access token too

            if (refreshToken) {
                try {
                    await fetch('/api/v1/token/blacklist/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${accessToken}`
                        },
                        body: JSON.stringify({ refresh: refreshToken })
                    });
                    console.log("Logged out successfully from backend.");
                } catch (error) {
                    console.error("Logout backend error:", error);
                }
            }

            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user_id');
            localStorage.removeItem('username');
            localStorage.removeItem('name'); // Also remove name from localStorage

            displayMessage('已退出登录，正在跳转到登录页面...', 'success');
            setTimeout(() => {
                window.location.href = '/login-test/';
            }, 1500);
        }

        // Initial load
        window.addEventListener('load', fetchUserProfile);
    </script>
</body>
</html>
